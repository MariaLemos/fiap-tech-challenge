services:
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        TRANSACTIONS_ZONE_ORIGIN: http://transactions:3001
        NEXT_PUBLIC_FINANCIAL_ALERTS_ORIGIN: ${FINANCIAL_ALERTS_PUBLIC_ORIGIN:-http://localhost:4201}
    ports:
      - "3000:3000"
    environment:
      TRANSACTIONS_ZONE_ORIGIN: http://transactions:3001
    depends_on:
      - transactions
      - financial-alerts-angular

  transactions:
    build:
      context: .
      dockerfile: apps/transactions/Dockerfile
    ports:
      - "3001:3001"

  financial-alerts-angular:
    build:
      context: .
      dockerfile: apps/financial-alerts-angular/Dockerfile
    ports:
      - "4201:80"
