services:
  auth:
    build:
      context: .
      dockerfile: apps/auth/Dockerfile
      args:
        NEXT_PUBLIC_APP_ORIGIN: ${NEXT_PUBLIC_APP_ORIGIN:-http://localhost:3000}
        NEXT_PUBLIC_AUTH_ORIGIN: ${NEXT_PUBLIC_AUTH_ORIGIN:-http://localhost:3002}
        AUTH_ASSET_PREFIX: /auth-static
    environment:
      AUTH_SECRET: ${AUTH_SECRET:?Defina AUTH_SECRET no arquivo .env}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-}
      AUTH_COOKIE_DOMAIN: ${AUTH_COOKIE_DOMAIN:-}
      AUTH_COOKIE_NAME: ${AUTH_COOKIE_NAME:-authjs.session-token}
      AUTH_ALLOWED_ORIGINS: ${AUTH_ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:3001,http://localhost:3002,http://localhost:3024,http://localhost:4201}
      AUTH_RATE_LIMIT_WINDOW_MINUTES: ${AUTH_RATE_LIMIT_WINDOW_MINUTES:-15}
      AUTH_RATE_LIMIT_MAX_ATTEMPTS: ${AUTH_RATE_LIMIT_MAX_ATTEMPTS:-5}
      AUTH_MOCK_USERS_JSON: ${AUTH_MOCK_USERS_JSON:-}
      AUTH_MOCK_USER_EMAIL: ${AUTH_MOCK_USER_EMAIL:-mariaj.lemos@yahoo.com}
      AUTH_MOCK_USER_NAME: ${AUTH_MOCK_USER_NAME:-maria}
      AUTH_MOCK_USER_PASSWORD_HASH: ${AUTH_MOCK_USER_PASSWORD_HASH:?Defina AUTH_MOCK_USER_PASSWORD_HASH no arquivo .env}
      NEXT_PUBLIC_APP_ORIGIN: ${NEXT_PUBLIC_APP_ORIGIN:-http://localhost:3000}
      NEXT_PUBLIC_AUTH_ORIGIN: ${NEXT_PUBLIC_AUTH_ORIGIN:-http://localhost:3002}
      NEXT_PUBLIC_INVESTMENTS_ORIGIN: ${NEXT_PUBLIC_INVESTMENTS_ORIGIN:-http://localhost:3001}
      NEXT_PUBLIC_FINANCIAL_ALERTS_ORIGIN: ${NEXT_PUBLIC_FINANCIAL_ALERTS_ORIGIN:-http://localhost:4201}
      AUTH_ASSET_PREFIX: /auth-static
    ports:
      - "3002:3002"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_FINANCIAL_ALERTS_ORIGIN: ${NEXT_PUBLIC_FINANCIAL_ALERTS_ORIGIN:-http://localhost:4201}
        INVESTMENTS_ORIGIN: http://investments:3001
        AUTH_ORIGIN: http://auth:3002
        NEXT_PUBLIC_AUTH_ORIGIN: ${NEXT_PUBLIC_AUTH_ORIGIN:-http://localhost:3002}
    environment:
      AUTH_SECRET: ${AUTH_SECRET:?Defina AUTH_SECRET no arquivo .env}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-}
      AUTH_COOKIE_NAME: ${AUTH_COOKIE_NAME:-authjs.session-token}
      AUTH_ORIGIN: http://auth:3002
      INVESTMENTS_ORIGIN: http://investments:3001
      NEXT_PUBLIC_APP_ORIGIN: ${NEXT_PUBLIC_APP_ORIGIN:-http://localhost:3000}
      NEXT_PUBLIC_AUTH_ORIGIN: ${NEXT_PUBLIC_AUTH_ORIGIN:-http://localhost:3002}
      NEXT_PUBLIC_FINANCIAL_ALERTS_ORIGIN: ${NEXT_PUBLIC_FINANCIAL_ALERTS_ORIGIN:-http://localhost:4201}
    ports:
      - "3000:3000"
    depends_on:
      - auth
      - financial-alerts-angular
      - investments

  investments:
    build:
      context: .
      dockerfile: apps/investments/Dockerfile
      args:
        NEXT_PUBLIC_AUTH_ORIGIN: ${NEXT_PUBLIC_AUTH_ORIGIN:-http://localhost:3002}
    environment:
      AUTH_SECRET: ${AUTH_SECRET:?Defina AUTH_SECRET no arquivo .env}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-}
      AUTH_COOKIE_NAME: ${AUTH_COOKIE_NAME:-authjs.session-token}
      AUTH_ORIGIN: http://auth:3002
      NEXT_PUBLIC_AUTH_ORIGIN: ${NEXT_PUBLIC_AUTH_ORIGIN:-http://localhost:3002}
      NEXT_PUBLIC_INVESTMENTS_ORIGIN: ${NEXT_PUBLIC_INVESTMENTS_ORIGIN:-http://localhost:3001}
    ports:
      - "3001:3001"
    depends_on:
      - auth

  financial-alerts-angular:
    build:
      context: .
      dockerfile: apps/financial-alerts-angular/Dockerfile
    ports:
      - "4201:80"
